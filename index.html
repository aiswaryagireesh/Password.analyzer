<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <canvas id="particles"></canvas>

    <!-- PASSWORD ANALYZER FIRST -->
    <div class="container">
        <h1>Password Analyzer</h1>

        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password">
            <button id="toggleBtn">Show</button>
        </div>

        <div class="strength">
            <p>Strength :</p>
            <div class="bar">
                <div id="strengthBar"></div>
            </div>
            <span id="strengthText">---</span>
        </div>

        <ul class="rules">
            <li id="len">At least 8 characters</li>
            <li id="upper">One uppercase letter</li>
            <li id="lower">One lowercase letter</li>
            <li id="num">One number</li>
            <li id="sym">One special symbol</li>
        </ul>
    </div>

    <!-- SIMPLE SMALL FEEDBACK -->
    <div class="feedback-section">
        <h3>💬 Feedback</h3>
        <textarea id="userFeedback" placeholder="Your thoughts..."></textarea>
        <button id="submitFeedback">Send</button>
        <p id="thankYouMessage"></p>
    </div>

    <script src="script.js"></script>

</body>
              </html>
